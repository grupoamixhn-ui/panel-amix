services:
  panel:
    build:
      context: .
      dockerfile: Dockerfile
    image: flussonic-admin:latest
    container_name: flussonic-admin
    restart: unless-stopped
    ports:
      - "${PANEL_PORT:-80}:80"
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: flussonic_admin
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (openssl rand -hex 32)}
      JWT_TTL_HOURS: "72"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@flussonic.io}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
      CORS_ORIGINS: "*"
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  mongo:
    image: mongo:7
    container_name: flussonic-admin-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo-data:
